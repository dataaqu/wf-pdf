<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 210mm;
      min-height: 297mm;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color: #1a1a1a;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 40px 50px;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #2563eb;
      padding-bottom: 20px;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      color: #2563eb;
      font-weight: 700;
    }

    .header .badge {
      background: #2563eb;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .content {
      margin-top: 30px;
    }

    .field-group {
      margin-bottom: 24px;
    }

    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .field-value {
      font-size: 16px;
      color: #1a1a1a;
      line-height: 1.6;
    }

    .footer {
      position: absolute;
      bottom: 30px;
      left: 50px;
      right: 50px;
      border-top: 1px solid #e5e7eb;
      padding-top: 15px;
      font-size: 10px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>{{title}}</h1>
      <span class="badge">Type A</span>
    </div>

    <div class="content">
      <div class="field-group">
        <div class="field-label">Field 1</div>
        <div class="field-value">{{field1}}</div>
      </div>

      <div class="field-group">
        <div class="field-label">Field 2</div>
        <div class="field-value">{{field2}}</div>
      </div>
    </div>

    <div class="footer">
      <span>Generated by PDF Generator</span>
      <span>Type A Document</span>
    </div>
  </div>
</body>
</html>
